<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟 🍅</title>
<style>
  /* ── Design Tokens ── */
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a30;
    --text: #e8e8f0;
    --text-secondary: #8e8ea8;

    /* Mode colors */
    --work: #ff5e5b;
    --work-glow: rgba(255, 94, 91, 0.35);
    --work-ambient: rgba(255, 94, 91, 0.08);
    --short-break: #3ddc84;
    --short-break-glow: rgba(61, 220, 132, 0.35);
    --short-break-ambient: rgba(61, 220, 132, 0.08);
    --long-break: #5b9cf5;
    --long-break-glow: rgba(91, 156, 245, 0.35);
    --long-break-ambient: rgba(91, 156, 245, 0.08);

    /* Glass morphism */
    --glass-bg: rgba(22, 22, 44, 0.55);
    --glass-border: rgba(255, 255, 255, 0.06);
    --glass-highlight: rgba(255, 255, 255, 0.04);

    /* Ring */
    --ring-bg: rgba(255, 255, 255, 0.06);
    --ring-track: #1e1e38;

    /* Buttons */
    --btn-bg: rgba(255, 255, 255, 0.07);
    --btn-hover: rgba(255, 255, 255, 0.13);

    /* Shadows */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
    --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.35);
    --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.45);

    /* Radii */
    --radius-sm: 10px;
    --radius-md: 18px;
    --radius-lg: 24px;
    --radius-full: 9999px;

    /* Timing */
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Body & Ambient Background ── */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
    position: relative;
  }

  /* Ambient glow — mode-colored radial ellipse at top */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, var(--ambient-color, transparent) 0%, transparent 70%);
    transition: opacity 0.8s ease;
  }

  body[data-mode="work"]       { --ambient-color: var(--work-ambient); }
  body[data-mode="shortBreak"] { --ambient-color: var(--short-break-ambient); }
  body[data-mode="longBreak"]  { --ambient-color: var(--long-break-ambient); }

  /* Subtle animated gradient overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
    background:
      radial-gradient(ellipse 80% 80% at 20% 80%, rgba(255, 94, 91, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse 80% 80% at 80% 20%, rgba(91, 156, 245, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 50% 100%, rgba(61, 220, 132, 0.03) 0%, transparent 50%);
    animation: ambientShift 18s ease-in-out infinite;
  }

  @keyframes ambientShift {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.55; }
  }

  /* ── Glass Container ── */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 36px 32px;
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md), inset 0 1px 0 var(--glass-highlight);
  }

  /* ── Mode Tabs ── */
  .mode-tabs {
    display: flex;
    gap: 4px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: var(--radius-full);
    padding: 4px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }
  .mode-tab {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    padding: 10px 24px;
    border-radius: var(--radius-full);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s var(--ease-out-expo);
    white-space: nowrap;
    position: relative;
  }
  .mode-tab.active {
    background: var(--btn-bg);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .mode-tab:hover:not(.active) {
    color: var(--text);
    background: rgba(255, 255, 255, 0.03);
  }

  /* ── Timer Ring ── */
  .ring-container {
    position: relative;
    width: 320px;
    height: 320px;
  }
  .ring-svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 14px var(--ring-glow, transparent));
    transition: filter 0.6s ease;
  }
  .ring-container.running .ring-svg {
    animation: ringPulse 3s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%, 100% { filter: drop-shadow(0 0 12px var(--ring-glow, transparent)); }
    50%      { filter: drop-shadow(0 0 22px var(--ring-glow, transparent)); }
  }

  .ring-bg {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 7;
  }
  .ring-progress {
    fill: none;
    stroke-width: 7;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s var(--ease-out-expo), stroke 0.5s ease;
  }
  .ring-progress.work        { stroke: var(--work);        --ring-glow: var(--work-glow); }
  .ring-progress.short-break { stroke: var(--short-break); --ring-glow: var(--short-break-glow); }
  .ring-progress.long-break  { stroke: var(--long-break);  --ring-glow: var(--long-break-glow); }

  .timer-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .timer-display {
    font-size: 74px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .timer-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-top: 2px;
  }

  /* ── Pomodoro Dots ── */
  .dots-row {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    transition: all 0.4s var(--ease-out-back);
  }
  .dot.done {
    background: var(--work);
    box-shadow: 0 0 12px var(--work-glow);
    animation: dotPop 0.45s var(--ease-out-back);
  }
  @keyframes dotPop {
    0%   { transform: scale(0.4); }
    60%  { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .btn {
    border: none;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s var(--ease-out-expo);
    color: var(--text);
    position: relative;
  }
  .btn:active {
    transform: scale(0.93);
  }

  /* Main button */
  .btn-main {
    width: 80px;
    height: 80px;
    font-size: 32px;
    font-weight: 700;
    border-radius: 50%;
    letter-spacing: 0px;
    transition: all 0.3s var(--ease-out-expo), transform 0.15s ease;
  }
  .btn-main:hover {
    transform: translateY(-3px);
  }
  .btn-main:active {
    transform: translateY(0) scale(0.94);
  }
  .btn-main.work-bg       { background: var(--work);        box-shadow: 0 6px 28px var(--work-glow); }
  .btn-main.short-break-bg{ background: var(--short-break); box-shadow: 0 6px 28px var(--short-break-glow); }
  .btn-main.long-break-bg { background: var(--long-break);  box-shadow: 0 6px 28px var(--long-break-glow); }

  .btn-main:hover.work-bg        { box-shadow: 0 8px 36px var(--work-glow); }
  .btn-main:hover.short-break-bg { box-shadow: 0 8px 36px var(--short-break-glow); }
  .btn-main:hover.long-break-bg  { box-shadow: 0 8px 36px var(--long-break-glow); }

  /* Secondary icon buttons */
  .btn-icon {
    width: 48px;
    height: 48px;
    font-size: 20px;
    background: var(--btn-bg);
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }
  .btn-icon:hover {
    background: var(--btn-hover);
    transform: translateY(-2px);
    box-shadow: var(--shadow-sm);
  }
  .btn-icon:active {
    transform: translateY(0) scale(0.93);
  }

  /* ── Settings Button ── */
  .settings-btn {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.06);
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text-secondary);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    z-index: 5;
  }
  .settings-btn:hover {
    background: var(--btn-hover);
    color: var(--text);
    transform: rotate(30deg);
  }

  /* ── Overlay & Modal ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: var(--glass-bg);
    backdrop-filter: blur(28px) saturate(150%);
    -webkit-backdrop-filter: blur(28px) saturate(150%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 32px;
    width: 90%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    box-shadow: var(--shadow-lg), inset 0 1px 0 var(--glass-highlight);
  }
  .modal h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .setting-row label {
    font-size: 14px;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .setting-row input {
    width: 72px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(0, 0, 0, 0.25);
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    font-family: inherit;
    transition: all 0.25s ease;
  }
  .setting-row input:focus {
    outline: none;
    border-color: var(--work);
    box-shadow: 0 0 0 3px var(--work-glow);
  }
  .setting-unit {
    font-size: 12px;
    color: var(--text-secondary);
    width: 32px;
    text-align: left;
  }
  .btn-save {
    border: none;
    padding: 13px;
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, var(--work), #ff7b78);
    color: #fff;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
  }
  .btn-save:hover {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px var(--work-glow);
  }
  .btn-save:active {
    transform: translateY(0);
  }
  .modal .btn-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .modal .btn-close:hover {
    background: rgba(255, 255, 255, 0.12);
    color: var(--text);
  }

  /* ── Responsive ── */
  @media (max-width: 420px) {
    .container {
      padding: 28px 20px;
      gap: 22px;
      margin: 16px;
    }
    .ring-container {
      width: 260px;
      height: 260px;
    }
    .timer-display {
      font-size: 56px;
    }
    .timer-label {
      font-size: 12px;
      letter-spacing: 3px;
    }
    .mode-tab {
      padding: 8px 16px;
      font-size: 12px;
    }
    .btn-main {
      width: 68px;
      height: 68px;
      font-size: 26px;
    }
    .btn-icon {
      width: 42px;
      height: 42px;
      font-size: 18px;
    }
    .controls {
      gap: 14px;
    }
    .dots-row {
      gap: 10px;
    }
    .dot {
      width: 12px;
      height: 12px;
    }
  }
</style>
</head>
<body data-mode="work">

<div class="container">
  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="work">🍅 工作</button>
    <button class="mode-tab" data-mode="shortBreak">☕ 短休</button>
    <button class="mode-tab" data-mode="longBreak">🏖️ 长休</button>
  </div>

  <!-- Timer Ring -->
  <div class="ring-container" id="ringContainer">
    <svg class="ring-svg" viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="92"/>
      <circle class="ring-progress work" id="ring" cx="100" cy="100" r="92"
              stroke-dasharray="578.05" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-content">
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-label" id="timerLabel">工作</div>
    </div>
  </div>

  <!-- Pomodoro Dots -->
  <div class="dots-row" id="dotsRow">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-icon" id="btnReset" title="重置 (R)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.5 18.5A9 9 0 1 0 2 12"/></svg>
    </button>
    <button class="btn btn-main work-bg" id="btnMain" title="开始/暂停 (空格)">▶</button>
    <button class="btn btn-icon" id="btnSkip" title="跳过 (S)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
  </div>
</div>

<!-- Settings -->
<button class="settings-btn" id="btnSettings" title="设置">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
</button>

<div class="overlay" id="overlay">
  <div class="modal" style="position: relative;">
    <button class="btn-close" id="btnCloseModal">✕</button>
    <h2>⚙ 设置</h2>
    <div class="setting-row">
      <label>🍅 工作时间</label>
      <input type="number" id="setWork" min="1" max="120" value="25">
      <span class="setting-unit">分钟</span>
    </div>
    <div class="setting-row">
      <label>☕ 短休息</label>
      <input type="number" id="setShort" min="1" max="60" value="5">
      <span class="setting-unit">分钟</span>
    </div>
    <div class="setting-row">
      <label>🏖️ 长休息</label>
      <input type="number" id="setLong" min="1" max="60" value="15">
      <span class="setting-unit">分钟</span>
    </div>
    <button class="btn-save" id="btnSave">保存设置</button>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// Audio – Web Audio API
// ──────────────────────────────────────────────
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playBeep(freq = 880, duration = 0.15, type = 'sine') {
  try {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (_) { /* silent fail */ }
}

function playAlarm() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    setTimeout(() => playBeep(freq, 0.3, 'sine'), i * 150);
  });
}

// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
const CIRCUMFERENCE = 2 * Math.PI * 92; // ~578.05
const modes = ['work', 'shortBreak', 'longBreak'];
const defaultDurations = { work: 25, shortBreak: 5, longBreak: 15 };

function loadSettings() {
  try {
    const saved = localStorage.getItem('pomodoro-settings');
    if (saved) return JSON.parse(saved);
  } catch (_) {}
  return { ...defaultDurations };
}

function saveSettings(settings) {
  localStorage.setItem('pomodoro-settings', JSON.stringify(settings));
}

let settings = loadSettings();

let state = {
  mode: 'work',
  pomodoros: 0,
  totalSeconds: settings.work * 60,
  remainingSeconds: settings.work * 60,
  running: false,
  startTime: null,
  elapsedBeforePause: 0,
};

// ──────────────────────────────────────────────
// DOM Refs
// ──────────────────────────────────────────────
const timerDisplay = document.getElementById('timerDisplay');
const timerLabel = document.getElementById('timerLabel');
const ring = document.getElementById('ring');
const ringContainer = document.getElementById('ringContainer');
const btnMain = document.getElementById('btnMain');
const btnReset = document.getElementById('btnReset');
const btnSkip = document.getElementById('btnSkip');
const btnSettings = document.getElementById('btnSettings');
const dotsRow = document.getElementById('dotsRow');
const overlay = document.getElementById('overlay');
const modeTabs = document.querySelectorAll('.mode-tab');

// ──────────────────────────────────────────────
// Display
// ──────────────────────────────────────────────
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateDisplay() {
  const { remainingSeconds, totalSeconds } = state;
  timerDisplay.textContent = formatTime(remainingSeconds);

  const fraction = remainingSeconds / totalSeconds;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);

  const label = state.mode === 'work' ? '工作' : state.mode === 'shortBreak' ? '短休' : '长休';
  document.title = state.running
    ? `${formatTime(remainingSeconds)} · ${label} 🍅`
    : `番茄钟 🍅`;
}

function updateModeUI() {
  ring.className = 'ring-progress ' + state.mode;

  const labels = { work: '工作', shortBreak: '短休', longBreak: '长休' };
  timerLabel.textContent = labels[state.mode];

  btnMain.className = 'btn btn-main ' + state.mode + '-bg';

  modeTabs.forEach(tab => {
    tab.classList.toggle('active', tab.dataset.mode === state.mode);
  });

  // Set body data-mode for ambient background
  document.body.dataset.mode = state.mode;

  updateDots();
}

function updateDots() {
  const dots = dotsRow.querySelectorAll('.dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('done', i < state.pomodoros);
  });
}

function updateBtnMainText() {
  btnMain.textContent = state.running ? '⏸' : '▶';
}

function refreshAll() {
  updateDisplay();
  updateModeUI();
  updateBtnMainText();
}

// ──────────────────────────────────────────────
// Timer Logic
// ──────────────────────────────────────────────
let intervalId = null;

function getElapsed() {
  if (!state.startTime) return 0;
  return Math.floor((Date.now() - state.startTime) / 1000);
}

function tick() {
  if (!state.running) return;

  const elapsed = getElapsed();
  const remaining = state.totalSeconds - state.elapsedBeforePause - elapsed;

  if (remaining <= 0) {
    state.remainingSeconds = 0;
    state.running = false;
    clearInterval(intervalId);
    intervalId = null;
    refreshAll();
    onTimerEnd();
    return;
  }

  state.remainingSeconds = remaining;
  updateDisplay();
  updateBtnMainText();
}

function startTimer() {
  if (state.running) return;

  requestWakeLock();

  state.running = true;
  state.startTime = Date.now();
  updateBtnMainText();
  updateDisplay();
  ringContainer.classList.add('running');

  intervalId = setInterval(tick, 200);
}

function pauseTimer() {
  if (!state.running) return;
  state.running = false;
  state.elapsedBeforePause += getElapsed();
  state.startTime = null;
  clearInterval(intervalId);
  intervalId = null;
  updateBtnMainText();
  ringContainer.classList.remove('running');

  releaseWakeLock();
}

function resetTimer() {
  const wasRunning = state.running;
  if (wasRunning) {
    clearInterval(intervalId);
    intervalId = null;
  }
  state.running = false;
  state.startTime = null;
  state.elapsedBeforePause = 0;
  state.totalSeconds = settings[state.mode] * 60;
  state.remainingSeconds = state.totalSeconds;
  ringContainer.classList.remove('running');
  refreshAll();
  releaseWakeLock();
}

function switchMode(mode) {
  const wasRunning = state.running;
  if (wasRunning) {
    clearInterval(intervalId);
    intervalId = null;
    releaseWakeLock();
  }

  state.mode = mode;
  state.running = false;
  state.startTime = null;
  state.elapsedBeforePause = 0;
  state.totalSeconds = settings[mode] * 60;
  state.remainingSeconds = state.totalSeconds;
  ringContainer.classList.remove('running');

  refreshAll();
}

function skipToNext() {
  clearInterval(intervalId);
  intervalId = null;
  state.running = false;
  releaseWakeLock();
  ringContainer.classList.remove('running');

  if (state.mode === 'work') {
    state.pomodoros = Math.min(state.pomodoros + 1, 4);
    if (state.pomodoros >= 4) {
      state.pomodoros = 0;
      switchMode('longBreak');
    } else {
      switchMode('shortBreak');
    }
  } else {
    switchMode('work');
  }
  refreshAll();
}

// ──────────────────────────────────────────────
// Timer End
// ──────────────────────────────────────────────
function onTimerEnd() {
  playAlarm();
  sendNotification();
  ringContainer.classList.remove('running');

  if (state.mode === 'work') {
    state.pomodoros = Math.min(state.pomodoros + 1, 4);
    updateDots();

    if (state.pomodoros >= 4) {
      state.pomodoros = 0;
      setTimeout(() => {
        switchMode('longBreak');
      }, 800);
    } else {
      setTimeout(() => {
        switchMode('shortBreak');
      }, 800);
    }
  } else {
    setTimeout(() => {
      switchMode('work');
    }, 800);
  }
}

function sendNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    const labels = { work: '工作时间结束！休息一下吧 ☕', shortBreak: '短休息结束，继续工作吧 🍅', longBreak: '长休息结束，开始新一轮 🍅' };
    new Notification('番茄钟 🍅', { body: labels[state.mode], icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍅</text></svg>' });
  }
}

// ──────────────────────────────────────────────
// Wake Lock
// ──────────────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (_) {}
  }
}

async function releaseWakeLock() {
  if (wakeLock) {
    try { await wakeLock.release(); } catch (_) {}
    wakeLock = null;
  }
}

// ──────────────────────────────────────────────
// Settings
// ──────────────────────────────────────────────
function openSettings() {
  document.getElementById('setWork').value = settings.work;
  document.getElementById('setShort').value = settings.shortBreak;
  document.getElementById('setLong').value = settings.longBreak;
  overlay.classList.add('show');
}

function closeSettings() {
  overlay.classList.remove('show');
}

function applySettings() {
  const work = parseInt(document.getElementById('setWork').value, 10);
  const shortBreak = parseInt(document.getElementById('setShort').value, 10);
  const longBreak = parseInt(document.getElementById('setLong').value, 10);

  settings = {
    work: Math.max(1, Math.min(120, work || 25)),
    shortBreak: Math.max(1, Math.min(60, shortBreak || 5)),
    longBreak: Math.max(1, Math.min(60, longBreak || 15)),
  };

  saveSettings(settings);

  state.mode = 'work';
  state.pomodoros = 0;
  state.running = false;
  state.startTime = null;
  state.elapsedBeforePause = 0;
  state.totalSeconds = settings.work * 60;
  state.remainingSeconds = state.totalSeconds;
  refreshAll();
  closeSettings();
}

// ──────────────────────────────────────────────
// Event Handlers
// ──────────────────────────────────────────────
btnMain.addEventListener('click', () => {
  if (state.running) {
    pauseTimer();
  } else {
    startTimer();
  }
});

btnReset.addEventListener('click', resetTimer);
btnSkip.addEventListener('click', skipToNext);

btnSettings.addEventListener('click', () => {
  if (overlay.classList.contains('show')) {
    closeSettings();
  } else {
    openSettings();
  }
});

document.getElementById('btnCloseModal').addEventListener('click', closeSettings);

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeSettings();
});

document.getElementById('btnSave').addEventListener('click', applySettings);

modeTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const mode = tab.dataset.mode;
    if (mode !== state.mode) {
      switchMode(mode);
    }
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;

  switch (e.code) {
    case 'Space':
      e.preventDefault();
      if (state.running) pauseTimer();
      else startTimer();
      break;
    case 'KeyR':
      resetTimer();
      break;
    case 'KeyS':
      skipToNext();
      break;
  }
});

// Request notification permission on first interaction
document.addEventListener('click', () => {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}, { once: true });

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
refreshAll();
</script>

</html>
